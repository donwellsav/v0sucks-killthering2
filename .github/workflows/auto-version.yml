name: Auto-Version on PR Merge

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  auto-version:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Bump version in package.json
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          npm version "0.${PR_NUMBER}.0" --no-git-tag-version

      - name: Update changelog
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const prNumber = context.payload.pull_request.number;
            const prTitle = context.payload.pull_request.title;
            const prBody = context.payload.pull_request.body || '';
            const prLabels = context.payload.pull_request.labels.map(l => l.name.toLowerCase());

            // Map labels to ChangeType
            const labelMap = {
              feat: 'feat',
              feature: 'feat',
              fix: 'fix',
              bug: 'fix',
              bugfix: 'fix',
              perf: 'perf',
              performance: 'perf',
              refactor: 'refactor',
              cleanup: 'refactor',
              ui: 'ui',
              design: 'ui',
            };

            let changeType = 'feat'; // default
            for (const label of prLabels) {
              if (labelMap[label]) {
                changeType = labelMap[label];
                break;
              }
            }

            // Parse bullet points from PR body
            const bullets = prBody
              .split('\n')
              .map(line => line.trim())
              .filter(line => /^[-*]\s+/.test(line))
              .map(line => line.replace(/^[-*]\s+/, '').trim())
              .filter(line => line.length > 0);

            // Build changes array
            const changes = bullets.length > 0
              ? bullets.map(b => ({ type: changeType, description: b }))
              : [{ type: changeType, description: prTitle }];

            // Build the new entry as a TypeScript string
            const version = `0.${prNumber}.0`;
            const today = new Date().toISOString().slice(0, 10);

            const escapeTs = (str) => str.replace(/\\/g, '\\\\').replace(/'/g, "\\'");

            const changesStr = changes
              .map(c => `      { type: '${c.type}', description: '${escapeTs(c.description)}' },`)
              .join('\n');

            const newEntry = [
              '  {',
              `    version: '${version}',`,
              `    date: '${today}',`,
              `    changes: [`,
              changesStr,
              '    ],',
              '  },',
            ].join('\n');

            // Read and update lib/changelog.ts
            const filePath = 'lib/changelog.ts';
            let content = fs.readFileSync(filePath, 'utf-8');

            const marker = 'export const CHANGELOG: ChangelogEntry[] = [';
            const markerIndex = content.indexOf(marker);
            if (markerIndex === -1) {
              core.setFailed('Could not find CHANGELOG array marker in lib/changelog.ts');
              return;
            }

            const insertPos = markerIndex + marker.length;
            content = content.slice(0, insertPos) + '\n' + newEntry + content.slice(insertPos);

            fs.writeFileSync(filePath, content, 'utf-8');
            core.info(`Inserted changelog entry for v${version}`);

      - name: Commit and push
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json lib/changelog.ts
          git commit -m "chore: auto-version v0.${PR_NUMBER}.0 [skip ci]"
          git push origin main
