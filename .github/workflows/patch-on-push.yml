name: Patch Version on Direct Push

on:
  push:
    branches: [main]

jobs:
  patch-version:
    # Skip: auto-version bot commits ([skip ci]) and PR merge commits
    if: |
      !contains(github.event.head_commit.message, '[skip ci]') &&
      !startsWith(github.event.head_commit.message, 'Merge pull request')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Increment patch version
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          echo "Current version: $CURRENT"

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"

          echo "New version: $NEW_VERSION"
          npm version "$NEW_VERSION" --no-git-tag-version

      - name: Update changelog
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf-8'));
            const version = pkg.version;
            const today = new Date().toISOString().slice(0, 10);

            const commitMessage = context.payload.head_commit.message;
            const firstLine = commitMessage.split('\n')[0].trim();

            const escapeTs = (str) => str.replace(/\\/g, '\\\\').replace(/'/g, "\\'");

            // Infer change type from conventional commit prefix
            let changeType = 'fix';
            if (/^feat[:(]/.test(firstLine)) changeType = 'feat';
            else if (/^perf[:(]/.test(firstLine)) changeType = 'perf';
            else if (/^refactor[:(]/.test(firstLine)) changeType = 'refactor';
            else if (/^ui[:(]/.test(firstLine)) changeType = 'ui';

            const newEntry = [
              '  {',
              `    version: '${version}',`,
              `    date: '${today}',`,
              `    changes: [`,
              `      { type: '${changeType}', description: '${escapeTs(firstLine)}' },`,
              '    ],',
              '  },',
            ].join('\n');

            const filePath = 'lib/changelog.ts';
            let content = fs.readFileSync(filePath, 'utf-8');

            const marker = 'export const CHANGELOG: ChangelogEntry[] = [';
            const markerIndex = content.indexOf(marker);
            if (markerIndex === -1) {
              core.setFailed('Could not find CHANGELOG array marker in lib/changelog.ts');
              return;
            }

            const insertPos = markerIndex + marker.length;
            content = content.slice(0, insertPos) + '\n' + newEntry + content.slice(insertPos);

            fs.writeFileSync(filePath, content, 'utf-8');
            core.info(`Inserted changelog entry for v${version}`);

      - name: Commit and push
        run: |
          NEW_VERSION=$(node -p "require('./package.json').version")
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json lib/changelog.ts
          git commit -m "chore: auto-version v${NEW_VERSION} [skip ci]"
          git push origin main
