<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kill The Ring — Icon Generator</title>
<style>
  body { background: #1a1a2e; color: #e0e0e0; font-family: system-ui, sans-serif; padding: 2rem; }
  h1 { color: #4B92FF; margin-bottom: 0.5rem; }
  .subtitle { color: #888; margin-bottom: 2rem; }
  .grid { display: flex; flex-wrap: wrap; gap: 2rem; }
  .icon-card { background: #111214; border-radius: 12px; padding: 1.5rem; text-align: center; }
  .icon-card canvas { display: block; margin: 0 auto 1rem; border-radius: 8px; image-rendering: -webkit-optimize-contrast; }
  .icon-card h3 { margin: 0 0 0.25rem; font-size: 0.9rem; }
  .icon-card p { margin: 0 0 0.75rem; font-size: 0.75rem; color: #888; }
  button { background: #4B92FF; color: #fff; border: none; padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; font-size: 0.8rem; }
  button:hover { background: #3a7de6; }
</style>
</head>
<body>
<h1>Kill The Ring — Icon Generator</h1>
<p class="subtitle">Spectrum Peak + Crosshair Reticle — click Download to save each icon</p>
<div class="grid" id="grid"></div>

<script>
const BG = '#111214';
const BLUE = '#4B92FF';
const BLUE_RGB = [75, 146, 255];

// Spectrum bar heights — sharp peak in center, lower on sides
// 21 bars, normalized 0-1
const BARS = [
  0.08, 0.12, 0.15, 0.20, 0.18, 0.25, 0.30, 0.38, 0.50, 0.65,
  1.00,  // center peak
  0.62, 0.48, 0.35, 0.28, 0.22, 0.18, 0.14, 0.11, 0.09, 0.06
];

function drawIcon(canvas, size, opts = {}) {
  const { maskable = false, light = false } = opts;
  const ctx = canvas.getContext('2d');
  canvas.width = size;
  canvas.height = size;

  const bg = light ? '#f0f0f0' : BG;
  const barColor = light ? '#1a2a4a' : BLUE;
  const barRGB = light ? [26, 42, 74] : BLUE_RGB;
  const reticleColor = light ? 'rgba(26,42,74,0.55)' : 'rgba(255,255,255,0.55)';
  const glowColor = light
    ? 'rgba(26,42,74,0.15)'
    : `rgba(${BLUE_RGB[0]},${BLUE_RGB[1]},${BLUE_RGB[2]},0.20)`;

  // Background
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, size, size);

  // Content area — for maskable, shrink to inner 80%
  const pad = maskable ? size * 0.10 : size * 0.08;
  const area = size - pad * 2;
  const cx = size / 2;
  const cy = size / 2;

  // ── Glow behind peak ──
  const glowR = area * 0.28;
  const peakTopY = cy - area * 0.32;
  const glowCy = peakTopY + glowR * 0.3;
  const grad = ctx.createRadialGradient(cx, glowCy, 0, cx, glowCy, glowR);
  grad.addColorStop(0, light ? 'rgba(26,42,74,0.18)' : `rgba(${BLUE_RGB[0]},${BLUE_RGB[1]},${BLUE_RGB[2]},0.25)`);
  grad.addColorStop(1, 'transparent');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, size, size);

  // ── Spectrum bars ──
  const barCount = BARS.length;
  const totalBarWidth = area * 0.82;
  const barGap = totalBarWidth * 0.03;
  const barW = (totalBarWidth - barGap * (barCount - 1)) / barCount;
  const maxBarH = area * 0.55;
  const barBaseY = cy + area * 0.18;
  const barStartX = cx - totalBarWidth / 2;

  for (let i = 0; i < barCount; i++) {
    const h = BARS[i] * maxBarH;
    const x = barStartX + i * (barW + barGap);
    const y = barBaseY - h;

    // Bar gradient — brighter at top
    const opacity = 0.5 + BARS[i] * 0.5;
    ctx.fillStyle = `rgba(${barRGB[0]},${barRGB[1]},${barRGB[2]},${opacity})`;

    // Rounded top
    const r = Math.min(barW / 2, 3 * (size / 512));
    ctx.beginPath();
    ctx.moveTo(x, barBaseY);
    ctx.lineTo(x, y + r);
    ctx.arcTo(x, y, x + r, y, r);
    ctx.arcTo(x + barW, y, x + barW, y + r, r);
    ctx.lineTo(x + barW, barBaseY);
    ctx.closePath();
    ctx.fill();
  }

  // ── Baseline ──
  ctx.strokeStyle = `rgba(${barRGB[0]},${barRGB[1]},${barRGB[2]},0.25)`;
  ctx.lineWidth = Math.max(1, size / 256);
  ctx.beginPath();
  ctx.moveTo(barStartX - area * 0.04, barBaseY);
  ctx.lineTo(barStartX + totalBarWidth + area * 0.04, barBaseY);
  ctx.stroke();

  // ── Crosshair reticle — centered on the peak ──
  const peakIdx = 10; // center bar
  const peakX = barStartX + peakIdx * (barW + barGap) + barW / 2;
  const peakH = BARS[peakIdx] * maxBarH;
  const peakY = barBaseY - peakH;
  const reticleY = peakY + peakH * 0.15; // slightly below tip
  const reticleR = area * 0.13;
  const lineExt = area * 0.04; // how far lines extend past circle

  ctx.strokeStyle = reticleColor;
  ctx.lineWidth = Math.max(1.5, size / 200);

  // Circle
  ctx.beginPath();
  ctx.arc(peakX, reticleY, reticleR, 0, Math.PI * 2);
  ctx.stroke();

  // Crosshair lines (extending beyond circle)
  // Top
  ctx.beginPath();
  ctx.moveTo(peakX, reticleY - reticleR - lineExt);
  ctx.lineTo(peakX, reticleY - reticleR * 0.35);
  ctx.stroke();
  // Bottom
  ctx.beginPath();
  ctx.moveTo(peakX, reticleY + reticleR * 0.35);
  ctx.lineTo(peakX, reticleY + reticleR + lineExt);
  ctx.stroke();
  // Left
  ctx.beginPath();
  ctx.moveTo(peakX - reticleR - lineExt, reticleY);
  ctx.lineTo(peakX - reticleR * 0.35, reticleY);
  ctx.stroke();
  // Right
  ctx.beginPath();
  ctx.moveTo(peakX + reticleR * 0.35, reticleY);
  ctx.lineTo(peakX + reticleR + lineExt, reticleY);
  ctx.stroke();

  // ── Small center dot ──
  ctx.fillStyle = reticleColor;
  ctx.beginPath();
  ctx.arc(peakX, reticleY, Math.max(1.5, size / 180), 0, Math.PI * 2);
  ctx.fill();
}

// ── Render all sizes ──
const icons = [
  { name: 'icon-512', size: 512, filename: 'icon-512.png', desc: 'Standard 512×512' },
  { name: 'icon-maskable-512', size: 512, filename: 'icon-maskable-512.png', desc: 'Maskable 512×512 (extra padding)', maskable: true },
  { name: 'icon-192', size: 192, filename: 'icon-192.png', desc: 'Standard 192×192' },
  { name: 'apple-icon', size: 180, filename: 'apple-icon.png', desc: 'Apple touch icon 180×180' },
  { name: 'icon-dark-32', size: 32, filename: 'icon-dark-32x32.png', desc: 'Favicon 32×32 (dark)' },
  { name: 'icon-light-32', size: 32, filename: 'icon-light-32x32.png', desc: 'Favicon 32×32 (light)', light: true },
];

const grid = document.getElementById('grid');
icons.forEach(icon => {
  const card = document.createElement('div');
  card.className = 'icon-card';

  const canvas = document.createElement('canvas');
  // Display at natural size, capped at 256px for large icons
  const displaySize = Math.min(icon.size, 256);
  canvas.style.width = displaySize + 'px';
  canvas.style.height = displaySize + 'px';

  drawIcon(canvas, icon.size, { maskable: icon.maskable, light: icon.light });

  const h3 = document.createElement('h3');
  h3.textContent = icon.filename;
  const p = document.createElement('p');
  p.textContent = icon.desc;

  const btn = document.createElement('button');
  btn.textContent = 'Download';
  btn.onclick = () => {
    const a = document.createElement('a');
    a.download = icon.filename;
    a.href = canvas.toDataURL('image/png');
    a.click();
  };

  card.appendChild(canvas);
  card.appendChild(h3);
  card.appendChild(p);
  card.appendChild(btn);
  grid.appendChild(card);
});
</script>
</body>
</html>
